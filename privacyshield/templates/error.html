{% extends "base.html" %}
{% block title %}{{ code }} &mdash; PrivacyShield{% endblock %}

{% block content %}
<section class="error-page">
  <p class="error-code">{{ code }}</p>
  <h1>{% if code == 404 %}We couldn't find that{% elif code == 413 %}File too large{% else %}Something went wrong{% endif %}</h1>
  <p class="error-message">{{ message }}</p>
  <a href="{{ url_for('home') }}" class="btn btn-primary">Back to home</a>
</section>
{% endblock %}
